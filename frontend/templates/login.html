<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Medical Report Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Medical background image with overlay */
            background: linear-gradient(rgba(102, 126, 234, 0.8), rgba(118, 75, 162, 0.8)), url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 400px;
            min-height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
        }

        h2 {
            color: #fff;
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-box {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            outline: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .btn {
            width: 100%;
            background: #fff;
            color: #667eea;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background: #f0f0f0;
        }

        .glow-circle {
            position: absolute;
            width: 200px;
            height: 200px;
            background: linear-gradient(#ff007a, #ff007a);
            border-radius: 50%;
            top: -60px;
            left: -60px;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.6;
        }

        .glow-circle:nth-child(2) {
            background: linear-gradient(#2196f3, #2196f3);
            top: auto;
            bottom: -60px;
            left: auto;
            right: -60px;
        }

        p.signup-link {
            margin-top: 20px;
            color: #fff;
            font-size: 14px;
        }

        p.signup-link a {
            color: #fff;
            font-weight: 600;
            text-decoration: none;
        }

        p.signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="glow-circle"></div>
    <div class="glow-circle"></div>
    <div class="container">
        <h2>Login</h2>
        <form action="/home" method="get"> <!-- Simple redirect for demo purposes -->
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>
    </div>
</body>

</html>
