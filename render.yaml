services:
  - type: web
    name: medical-report-analyzer
    env: docker
    plan: free # Standard free tier
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: TESSERACT_CMD
        value: tesseract
      - key: PORT
        value: "10000"
    # Note: Go to New+ -> Blueprint on Render to use this.
    # If the name is taken, Render will add a suffix.
